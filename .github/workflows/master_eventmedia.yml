# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - eventmedia

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allow manual triggering of the workflow

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      # Checkout the code from the repository
      - uses: actions/checkout@v4

      # Set up Node.js environment (use Node.js version 14 or 16 instead of 24, since Node.js 24 might not be stable yet)
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '14.x'  # Change this to '14.x' or '16.x' if needed

      # Install dependencies and build the app
      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present
          # Since you might not have tests set up yet, let's skip the test run here
          # If you want to run tests later, uncomment the following line:
          # npm run test --if-present

      # Upload the built app artifacts to be used in the deployment job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build  # This job depends on the build job
    permissions:
      id-token: write  # Required for requesting the JWT
      contents: read  # Required for actions/checkout

    steps:
      # Download the build artifacts from the previous job
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Login to Azure using service principal credentials
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_63B34B333F6247FC9B629DD375F3D055 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A6CED1D8F53C4190A38C5E03033A8937 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_314C1BA31EB744508BF8136B5A5F516C }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'eventmedia'  # Ensure this matches your Azure Web App name
          slot-name: 'Production'  # This deploys to the production slot
          package: .  # This specifies the current directory to be deployed
